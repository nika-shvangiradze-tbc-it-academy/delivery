<div class="header-fixed">
<header class="header">
  <section class="header__container">
    <div class="header__content">
      <img src="/assets/header/location.svg" alt="logo" class="header__image" width="30" height="30"/>
      <h1 class="header__title">Location</h1>
    </div>

    <button
      class="header__burger"
      type="button"
      (click)="toggleMenu()"
      [attr.aria-expanded]="isMenuOpen"
      aria-label="Toggle navigation menu"
    >
      <span [class.is-open]="isMenuOpen"></span>
      <span [class.is-open]="isMenuOpen"></span>
      <span [class.is-open]="isMenuOpen"></span>
    </button>

    <nav class="header__navigation" [class.is-open]="isMenuOpen">
      <div class="header__nav-primary">
        <a
          href="#home"
          [class.is-active]="activeSection === 'home'"
          (click)="onNavClick('home', $event)"
        >{{ 'nav.home' | t }}</a>
        <a
          href="#about"
          [class.is-active]="activeSection === 'about'"
          (click)="onNavClick('about', $event)"
        >{{ 'nav.about' | t }}</a>
        <a
          href="#contact"
          [class.is-active]="activeSection === 'contact'"
          (click)="onNavClick('contact', $event)"
        >{{ 'nav.contact' | t }}</a>
        <a
          href="#pricing"
          [class.is-active]="activeSection === 'cities'"
          (click)="onNavClick('cities', $event)"
        >{{ 'nav.pricing' | t }}</a>
        <a
          href="#cities"
          [class.is-active]="activeSection === 'pricing'"
          (click)="onNavClick('pricing', $event)"
        >{{ 'nav.cities' | t }}</a>
      </div>
      <div class="header__lang" [attr.aria-label]="'app.languageLabel' | t">
        <button
          type="button"
          class="header__lang-btn"
          [class.is-active]="currentLanguage() === 'ka'"
          (click)="onLanguageChange('ka')"
        >
          KA
        </button>
        <button
          type="button"
          class="header__lang-btn"
          [class.is-active]="currentLanguage() === 'en'"
          (click)="onLanguageChange('en')"
        >
          EN
        </button>
      </div>
      <div class="header__contact header__contact--in-menu" aria-label="Contact">
        <a href="tel:+995551099081" class="header__contact-link" (click)="closeMenu()">
          <span class="header__contact-icon-frame" aria-hidden="true">
            <svg class="header__contact-icon" xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/>
            </svg>
          </span>
          <span>+995 551 099 081</span>
        </a>
        <a href="mailto:shvangiradzze1010@gmail.com" class="header__contact-link" (click)="closeMenu()">
          <span class="header__contact-icon-frame" aria-hidden="true">
            <svg class="header__contact-icon" xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
              <polyline points="22,6 12,13 2,6"/>
            </svg>
          </span>
          <span>shvangiradzze1010@gmail.com</span>
        </a>
      </div>
    </nav>
    <div class="header__contact header__contact--toolbar" aria-label="Contact">
      <a href="tel:+995551099081" class="header__contact-link">
        <span class="header__contact-icon-frame" aria-hidden="true">
          <svg class="header__contact-icon" xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/>
          </svg>
        </span>
        <span>+995 551 099 081</span>
      </a>
      <a href="mailto:shvangiradzze1010@gmail.com" class="header__contact-link">
        <span class="header__contact-icon-frame" aria-hidden="true">
          <svg class="header__contact-icon" xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
            <polyline points="22,6 12,13 2,6"/>
          </svg>
        </span>
        <span>shvangiradzze1010@gmail.com</span>
      </a>
    </div>

  </section>
</header>
</div>
