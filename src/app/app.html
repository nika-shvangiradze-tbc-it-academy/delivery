@if (isPageLoading()) {
  <div class="page-loader" aria-live="polite" aria-label="Loading page">
    <div class="page-loader__track" aria-hidden="true">
      <div class="page-loader__road-line"></div>
      <div class="page-loader__car">
        <svg class="page-loader__car-svg" viewBox="0 0 128 56" xmlns="http://www.w3.org/2000/svg" focusable="false">
          <g class="page-loader__car-body">
            <rect x="8" y="22" width="92" height="24" rx="5" fill="#db7623" />
            <path d="M72 22 L94 8 L108 8 L108 22 Z" fill="#c45f1a" />
            <rect x="76" y="11" width="26" height="12" rx="2" fill="rgba(255,255,255,0.45)" />
            <rect x="14" y="28" width="18" height="10" rx="2" fill="rgba(255,255,255,0.2)" />
          </g>
          <g class="page-loader__parcel" aria-hidden="true">
            <path d="M28 10 L32 7 L60 7 L64 10 L64 21 L60 22 L32 22 L28 21 Z" fill="#8f5c2b" />
            <rect x="32" y="7" width="28" height="15" rx="1.5" fill="#c9955c" />
            <path d="M32 7 L28 10 L28 21 L32 22 Z" fill="#a67642" />
            <rect x="44" y="7" width="1.2" height="15" fill="rgba(139,90,43,0.55)" />
            <rect x="32" y="14" width="28" height="1.2" fill="rgba(139,90,43,0.45)" />
            <rect x="33" y="8" width="26" height="3" rx="0.5" fill="rgba(255,255,255,0.22)" />
          </g>
          <g transform="translate(26,46)">
            <g class="page-loader__wheel">
              <circle r="11" fill="#2a2a2a" />
              <circle r="5" fill="#5a5a5a" />
            </g>
          </g>
          <g transform="translate(90,46)">
            <g class="page-loader__wheel">
              <circle r="11" fill="#2a2a2a" />
              <circle r="5" fill="#5a5a5a" />
            </g>
          </g>
        </svg>
      </div>
    </div>
    <p class="page-loader__text">Loading...</p>
  </div>
}

<div class="app-content" [class.app-content--hidden]="isPageLoading()">
  <app-delivery-main></app-delivery-main>
</div>
