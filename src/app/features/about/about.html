<section id="about" class="about">
    <div class="about__title">
        <h3>{{ 'about.title' | t }}</h3>
    </div>
    <div class="about__content">
      <div class="about__item">
        <h3>{{ 'about.highlight' | t }}</h3>
        <p [innerText]="'about.body' | t"></p>
      </div>
      <div class="about__img">
        <img src="/assets/Picture1.png" alt="about" width="100%" height="100%"/>
      </div>
    </div>
    <div class="about__features">
        <div class="about__card">
                <h3>{{ 'about.companiesTitle' | t }}</h3>
                <p>{{ 'about.companiesText' | t }}</p>
        </div>
        <div class="about__card">
                <h3>{{ 'about.priceTitle' | t }}</h3>
                <p>{{ 'about.priceText' | t }}</p>
        </div>
        <div class="about__card">
                <h3>{{ 'about.speedTitle' | t }}</h3>
                <p>{{ 'about.speedText' | t }}</p>
        </div>
    </div>
</section>
